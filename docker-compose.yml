services:
  # Laravel Application
  app:
    build:
      context: ./docker
      dockerfile: php/Dockerfile
    container_name: floz-app
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - floz-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=0

  # Nginx Web Server
  nginx:
    image: nginx:1.25-alpine
    container_name: floz-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - floz-network
    depends_on:
      - app

  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: floz-postgres
    restart: always
    environment:
      POSTGRES_DB: floz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - floz-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - floz-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d floz" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: floz-redis
    restart: always
    volumes:
      - floz-redis-data:/data
    networks:
      - floz-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Horizon Queue Worker
  horizon:
    build:
      context: ./docker
      dockerfile: php/Dockerfile
    container_name: floz-horizon
    restart: always
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./src:/var/www/html
    networks:
      - floz-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Scheduler (Cron)
  scheduler:
    build:
      context: ./docker
      dockerfile: php/Dockerfile
    container_name: floz-scheduler
    restart: always
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./src:/var/www/html
    networks:
      - floz-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  floz-network:
    driver: bridge

volumes:
  floz-postgres-data:
  floz-redis-data:
