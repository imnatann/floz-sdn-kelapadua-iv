services:
  # Laravel Application (PHP-FPM)
  app:
    build:
      context: ./docker
      dockerfile: php/Dockerfile
    container_name: floz-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - floz-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1

  # Nginx Web Server
  nginx:
    image: nginx:1.25-alpine
    container_name: floz-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - floz-network
    depends_on:
      - app

  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: floz-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: floz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - floz-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - floz-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d floz" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (Cache & Queue)
  redis:
    image: redis:7-alpine
    container_name: floz-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - floz-redis-data:/data
    networks:
      - floz-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Vite Dev Server (for HMR in development)
  node:
    image: node:20-alpine
    container_name: floz-node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - floz-network
    depends_on:
      - app

networks:
  floz-network:
    driver: bridge

volumes:
  floz-postgres-data:
  floz-redis-data:
